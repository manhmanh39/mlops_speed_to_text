stages:
  prepare:
    cmd: >
      python -c "import pandas as pd, os, sys;
      meta = pd.read_csv('${data.meta_csv}', sep='|', header=None, names=['filename','transcript']);
      wav_dir = os.path.join('${data.extracted_dir}', 'wavs');
      missing = [f for f in meta['filename'] if not os.path.exists(os.path.join(wav_dir, f))];
      print(f'Dataset rows: {len(meta)}, missing wavs: {len(missing)}');
      sys.exit(1) if missing else print('All WAV files present.')"
    deps:
      - ${data.meta_csv}
      - ${data.extracted_dir}/wavs
    outs:
      - prepare.log:
          cache: false

  train:
    cmd: >
      python src/models/train_wav2vec2.py
      --extracted_dir ${data.extracted_dir}
      --meta_csv ${data.meta_csv}
      --output_dir ${train.output_dir}
      --num_train_epochs ${train.num_train_epochs}
      --learning_rate ${train.learning_rate}
      --per_device_train_batch_size ${train.per_device_train_batch_size}
      --gradient_accumulation_steps ${train.gradient_accumulation_steps}
    deps:
      - src/models/train_wav2vec2.py
      - ${data.meta_csv}
      - ${data.extracted_dir}/wavs
    params:
      - data
      - train
    outs:
      - ${train.output_dir}

  evaluate:
    cmd: >
      python src/models/eval_wav2vec2.py
      --wav_dir ${eval.wav_dir}
      --model_dir ${train.output_dir}
      --local_weights ${train.output_dir}/model.safetensors
      --out_save_dir ${eval.out_save_dir}
      --run_postprocess
    deps:
      - src/models/eval_wav2vec2.py
      - ${train.output_dir}
      - ${eval.wav_dir}
    params:
      - eval
    outs:
      - ${eval.out_save_dir}